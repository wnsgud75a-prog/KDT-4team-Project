<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendBridge | 회원가입</title>
    <link rel="stylesheet" th:href="@{/assets/css/styles.css}">
</head>
<body data-page="signup">
<main class="container login-center-wrap">
    <div class="card login-center-card">
        <h1 class="login-title">회원가입</h1>
        <p class="muted login-subtitle">일반 회원가입 정보를 입력하세요.</p>

        <form action="/signup" method="post" class="list" style="margin-top: 12px;">
            <input type="text" name="nickname" placeholder="닉네임" required>
            <input type="email" name="id" placeholder="이메일" required>
            <input type="password" name="pw" placeholder="비밀번호" required>
            <button type="submit">회원가입</button>
        </form>
    </div>
</main>
</body>
</html>
