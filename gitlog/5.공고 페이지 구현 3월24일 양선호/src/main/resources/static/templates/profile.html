<!doctype html><html lang="ko"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>TrendBridge | 프로필</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="/css/styles.css" /></head><body data-page="프로필" data-protected="true">  <header class="site-header">    <div class="topbar">      <a class="brand" href="index.html">TrendBridge</a>      <nav class="nav">        <a href="index.html" data-page="jobs">공고 보기</a>        <a href="jobs.html" data-page="dashboard">트렌드 차트</a>        <a href="matching.html" data-page="matching">매칭 분석</a>        </nav>      <div id="authArea" class="auth-area"><a class="auth-btn secondary" href="login.html">로그인</a><a class="auth-btn" href="signup.html">회원가입</a></div>    </div>  </header>  <main class="container">    <section class="hero">      <h1>프로필</h1>      <p>수동 입력 또는 GitHub 연동으로 보유 기술을 관리하고, 관심 스택 급등 알림도 함께 설정합니다.</p>    </section>    <section class="card" style="margin-top:16px">      <h2>스택 관리</h2>      <div class="row">        <input id="프로필StackInput" type="text" placeholder="기술 스택 입력" />        <button id="프로필StackAdd" type="button" class="secondary">수동 추가</button>        <button id="syncGithub" type="button">GitHub 연동</button>        <button id="save프로필" type="button">저장</button>      </div>      <div id="프로필Stacks" class="taglist" style="margin-top:12px"></div>      <p id="프로필Status" class="muted" style="margin-top:12px">저장 전</p>    </section>    <section class="grid two">      <article class="card">        <h2>관심 스택 급등 알림</h2>        <form id="프로필AlertForm" class="list">          <select id="프로필AlertRole" class="role-select"></select>          <input id="프로필AlertStack" type="text" placeholder="관심 스택" required />          <input id="프로필AlertThreshold" type="number" value="20" min="5" max="100" />          <button type="submit">알림 조건 저장</button>        </form>      </article>      <article class="card">        <h3>최근 알림 로그</h3>        <div id="프로필AlertLog" class="list"></div>      </article>    </section>  </main>  <script src="/js/theme.js" defer></script>  <script src="/js/auth.js" defer></script></body></html>
