<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 공고 보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="공고 보기">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="index.html">TrendBridge</a>
      <nav class="nav">
        <a href="index.html" data-page="jobs">공고 보기</a>
        <a href="jobs.html" data-page="dashboard">트렌드 차트</a>
        <a href="matching.html" data-page="matching">매칭 분석</a>
        
      </nav>
      <div id="authArea" class="auth-area"><a class="auth-btn secondary" href="login.html">로그인</a><a class="auth-btn" href="signup.html">회원가입</a></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>공고 보기</h1>
      <p>특정 기술 스택 중심으로 공고를 빠르게 추려서 바로 탐색할 수 있습니다.</p>
    </section>

    <section class="card" style="margin-top:16px">
      <h2>공고</h2>
       <div class="tabs" id="trendCategoryTabs" style="margin-top:12px;">
          <button class="tab-btn active" type="button" data-category="backend">백엔드</button>
          <button class="tab-btn" type="button" data-category="frontend">프론트엔드</button>
          <button class="tab-btn" type="button" data-category="ai-data">인공지능/데이터</button>
          <button class="tab-btn" type="button" data-category="infra">인프라</button>
        </div>
        <br>
      <div id="jobList" class="list"></div>

    </section>
  </main>
  <script src="/js/theme.js" defer></script>
  <script src="/js/auth.js" defer></script>
  <script src="/js/tabs.js" defer></script>
</body>
</html>
