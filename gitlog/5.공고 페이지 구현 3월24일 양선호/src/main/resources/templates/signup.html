<!doctype html><html lang="ko"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>TrendBridge | 회원가입</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="/css/styles.css" /></head><body data-page="signup"><main class="container login-center-wrap">  <div class="card login-center-card">    <h1 class="login-title">회원가입</h1>    <p class="muted login-subtitle">일반 회원가입 정보를 입력하세요.</p>    <form action="/api/signup" method="post" class="list" style="margin-top:12px;">      <input id="signupNickname" name="nickname" type="text" placeholder="닉네임" required />      <input id="signupEmail" name="id" type="email" placeholder="이메일" required />      <input id="signupPassword" name="pw" type="password" placeholder="비밀번호" required />      <button id="signupBtn" type="submit">회원가입</button>    </form>  </div></main>  <script src="/js/theme.js" defer></script>  <script src="/js/auth.js" defer></script>  <script src="/js/signup.js" defer></script></body></html>
