<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}" />
</head>
<body data-page="signup">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="/" th:href="@{/}">TrendBridge</a>
      <nav class="nav">
        <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
        <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
        <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
        <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
      </nav>
      <div id="themeArea" class="theme-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button></div><div id="authArea" class="auth-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button><a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a><a class="auth-btn" href="/signup" th:href="@{/signup}">회원가입</a></div>
    </div>
  </header>
  <main class="container login-center-wrap">
    <div class="card login-center-card">
      <h1 class="login-title">회원가입</h1>
      <p class="muted login-subtitle">이메일로 간편하게 가입하세요.</p>
      <div class="list" style="margin-top:12px;">
        <input id="signupEmail" type="email" placeholder="이메일" />
        <input id="signupPassword" type="password" placeholder="비밀번호" />
        <input id="signupNickname" type="text" placeholder="닉네임" />
        <button id="signupBtn" type="button">회원가입</button>
      </div>
    </div>
  </main>
  <script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
  <script src="/js/auth.js" th:src="@{/js/auth.js}" defer></script>
  <script src="/js/signup.js" th:src="@{/js/signup.js}" defer></script>
</body>
</html>
