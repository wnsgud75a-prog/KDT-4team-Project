<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 매칭 분석 세부 설정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}" />
</head>
<body data-page="매칭 분석" class="matching-detail-page">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="/" th:href="@{/}">TrendBridge</a>
      <nav class="nav">
        <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
        <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
        <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
        <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
      </nav>
      <div id="themeArea" class="theme-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button></div><div id="authArea" class="auth-area"><a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a><a class="auth-btn" href="/signup" th:href="@{/signup}">회원가입</a></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>세부 설정</h1>
      <p>대분류와 소분류를 선택해 맞춤 회사를 확인합니다.</p>
    </section>

    <section class="card" style="margin-top:16px">
      <div class="row" style="margin-bottom:12px">
        <select id="majorCategory">
          <option value="">대분류 선택</option>
          <option value="백엔드">백엔드</option>
          <option value="프론트엔드">프론트엔드</option>
          <option value="인공지능/데이터">인공지능/데이터</option>
          <option value="인프라/보안">인프라/보안</option>
          <option value="모바일">모바일</option>
        </select>
        <select id="minorCategory">
          <option value="">소분류 선택</option>
        </select>
        <button id="applyCategory" type="button" class="secondary">적용</button>
      </div>

      <h3>공고</h3>
      <div id="companyList" class="list">
        <p class="muted" style="text-align:center; padding:20px 0;">대분류를 선택하고 적용 버튼을 눌러주세요.</p>
      </div>
      <div id="matchingPagination" class="pagination" style="margin-top:12px;"></div>

      <div class="row" style="margin-top:12px">
        <a class="auth-btn secondary" href="/matching" th:href="@{/matching}">매칭 분석으로 돌아가기</a>
      </div>
    </section>
  </main>
  <script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
  <script src="/js/auth.js" th:src="@{/js/auth.js}" defer></script>
  <script src="/js/matching-detail.js?v=4" th:src="@{/js/matching-detail.js(v=4)}" defer></script>
</body>
</html>
