<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 프로필</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" th:href="@{/css/styles.css}" />
</head>
<body data-page="프로필" data-protected="true">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="/" th:href="@{/}">TrendBridge</a>
      <nav class="nav">
        <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
        <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
        <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
        <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
      </nav>
      <div id="themeArea" class="theme-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button></div><div id="authArea" class="auth-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button><a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a><a class="auth-btn" href="/signup" th:href="@{/signup}">회원가입</a></div>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <h1>프로필</h1>
      <p>수동 입력 또는 GitHub 연동으로 보유 기술을 관리하고, 관심 스택 급등 알림도 함께 설정합니다.</p>
    </section>
    <section class="card" style="margin-top:16px">
      <h2>회원 정보</h2>
      <div class="list" style="gap:12px;">
        <div class="row">
          <span class="muted">로그인 ID</span>
          <strong th:text="${session.loginUser}">로그인 아이디</strong>
        </div>
        <div class="row">
          <span class="muted">닉네임</span>
          <strong id="profileNicknameView">-</strong>
        </div>
        <div class="row">
          <span class="muted">자기소개</span>
          <strong id="profileIntroView">-</strong>
        </div>
        <div class="row">
          <span class="muted">보유 기술 스택</span>
          <div id="profileStacksView" class="taglist"></div>
        </div>
      </div>
      <div class="row profile-card-actions" style="margin-top:12px;">
        <a class="auth-btn active" href="/profile-edit" th:href="@{/profile-edit}">프로필 수정</a>
      </div>
    </section>
  </main>
  <script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
  <script src="/js/auth.js" th:src="@{/js/auth.js}" defer></script>
  <script src="/js/profile.js" th:src="@{/js/profile.js}" defer></script>
</body>
</html>
