<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="login">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="index.html">TrendBridge</a>
      <nav class="nav">
        <a href="index.html" data-page="jobs">공고 보기</a>
        <a href="jobs.html" data-page="dashboard">트렌드 차트</a>
        <a href="matching.html" data-page="matching">매칭 분석</a>
        <a href="profile.html" data-page="profile">프로필</a>
      </nav>
      <div id="authArea" class="auth-area"><a class="auth-btn secondary" href="login.html">로그인</a><a class="auth-btn" href="signup.html">회원가입</a></div>
    </div>
  </header>

  <main class="container login-center-wrap">
    <div class="card login-center-card">
      <h1 class="login-title">로그인</h1>
      <p class="muted login-subtitle">이메일 로그인 또는 소셜 로그인을 선택하세요.</p>

      <div class="list" style="margin-top:12px;">
        <input id="loginEmail" type="email" placeholder="이메일" />
        <input id="loginPassword" type="password" placeholder="비밀번호" />
        <button id="loginBtn" type="button">로그인</button>
      </div>

      <div class="social-divider">또는</div>
      <div class="social-stack">
        <button id="loginGoogle" class="gsi-material-button gsi-full" type="button" aria-label="Sign in with Google">
          <div class="gsi-material-button-state"></div>
          <div class="gsi-material-button-content-wrapper">
            <div class="gsi-material-button-icon">
              <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.7 1.22 9.2 3.6l6.9-6.9C35.8 2.2 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l8 6.2C12.4 13 17.7 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.5c0-1.5-.1-2.6-.3-3.8H24v7.2h12.5c-.3 2-1.8 5-5 7l7.7 6c4.5-4.1 7-10.2 7-16.4z"/>
                <path fill="#FBBC05" d="M10.6 28.4c-.5-1.4-.8-2.8-.8-4.4 0-1.6.3-3 .8-4.4l-8-6.2C.9 16.6 0 20.2 0 24s.9 7.4 2.6 10.6l8-6.2z"/>
                <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.7-6c-2.1 1.4-4.9 2.4-7.8 2.4-6.3 0-11.6-3.6-13.4-8.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
              </svg>
            </div>
            <span class="gsi-material-button-contents">Sign in with Google</span>
          </div>
        </button>
        <button id="loginGithub" class="gh-material-button gsi-full" type="button" aria-label="Sign in with GitHub">
          <div class="gsi-material-button-content-wrapper">
            <div class="gsi-material-button-icon">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
                <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.5v-2c-3.3.7-4-1.6-4-1.6-.5-1.3-1.3-1.7-1.3-1.7-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.4 3.6 1.1.1-.8.4-1.4.7-1.7-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.2 11.2 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8.1 3.1.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5A12 12 0 0 0 12 .5z"/>
              </svg>
            </div>
            <span class="gsi-material-button-contents">Sign in with GitHub</span>
          </div>
        </button>
      </div>
    </div>
  </main>
</body>
</html>
